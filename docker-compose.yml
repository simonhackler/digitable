services:
  postgres:
    image: postgres:16-alpine
    container_name: svg-table-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svg_table}
      POSTGRES_USER: ${POSTGRES_USER:-svg_table}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svg_table}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
